<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0066ff">
    
    <title>グッズの計算機</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="DOMOTOfavicon.png">

    <style>
        html, body { scrollbar-width: none !important; -ms-overflow-style: none !important; overflow-x: hidden !important; }
        body { font-family: system-ui, sans-serif; background: linear-gradient(to bottom, #f8bbd0, #b3e5fc); background-attachment: fixed; margin: 0; padding: 0 0 100px; }
        h1 { margin: 0; padding: 0 16px; height: 70px; display: flex; flex-direction: column; justify-content: center; background: #0066ff; color: #fff; text-align: center; font-size: 20px; font-weight: 800; }
        .kyokasho { font-family: "YuKyokasho", "游教科書体", serif; font-size: 18px; font-weight: 600; }
        .controls { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        
        /* セグメントボタン */
        .segment-container { display: flex; gap: 4px; background: rgba(255,255,255,.5); padding: 4px; border-radius: 24px; }
        .segment-btn { flex: 1; height: 40px; border-radius: 20px; border: none; background: transparent; color: #555; font-weight: 600; cursor: pointer; transition: .2s; }
        .segment-btn.active { background: #fff; color: #0066ff; box-shadow: 0 2px 4px rgba(0,0,0,.1); }
        
        .reset-btn { height: 40px; padding: 0 20px; border-radius: 20px; border: none; background: rgba(255,255,255,.92); box-shadow: 0 2px 6px rgba(0,0,0,.12); color: #333; font-size: 15px; font-weight: 600; cursor: pointer; }
        
        .card { background: rgba(255, 255, 255, 0.7); margin: 10px; border-radius: 16px; padding: 14px; backdrop-filter: blur(5px); box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05); }
        .badge { background: #666; color: #fff; border-radius: 4px; padding: 2px 6px; font-size: 10px; margin-left: 6px; vertical-align: middle; }
        .price { font-weight: 700; color: #183153; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        
        /* リンクスタイル */
        .item-link { color: inherit; text-decoration: underline; font-weight: bold; }
        
        /* 非活性時の制御（ボタンエリアのみに限定） */
        .card.disabled .qty-area { opacity: 0.4; pointer-events: none; filter: grayscale(1); }
        
        .qty-val { font-size: 22px; font-weight: 800; width: 30px; text-align: center; }
        .qty-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: #fff; font-size: 22px; cursor: pointer; }
        .qty-btn:disabled { opacity: 0.3; }
        
        #bar { position: fixed; left: 0; right: 0; bottom: 0; background: #d91e18; color: #fff; height: 70px; display: flex; align-items: center; padding: 0 20px; }
        .bar-left { flex: 1; font-size: 12px; font-weight: bold; }
        .bar-right { width: 140px; text-align: right; font-size: 23px; font-weight: 800; }
    </style>
</head>
<body>
    <h1>グッズの計算機<br><span class="kyokasho">そんなものあるわ</span></h1>
    <div class="controls">
        <div class="segment-container">
            <button id="btn-tky" class="segment-btn" onclick="toggleVenue('tky')">東京公演</button>
            <button id="btn-osk" class="segment-btn" onclick="toggleVenue('osk')">大阪公演</button>
        </div>
        <button class="reset-btn" onclick="resetAll()">リセット</button>
    </div>
    <div id="list"></div>
    <div id="bar">
        <div class="bar-left" id="bar-left-content"></div>
        <div class="bar-right" id="total-val-content"></div>
    </div>
    <script>
        if ("serviceWorker" in navigator) navigator.serviceWorker.register("./sw.js");

        const items = [
            ["フォトパンフ", 3500, 2, 0, false, "https://store.domotofc.jp/detail.php?goods_id=24"],
            ["ポリうちわ", 1300, 2, 0, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=15"],
            ["ハンドタオル", 1900, 2, 0, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=16"],
            ["アクリルスタンド（全3種類）", 1400, 5, 0, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=25"],
            ["アクリルスタンド（コンプリートセット）", 4900, 2, 0, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=23"],
            ["ビッグシルエットTシャツ", 6000, 2, 0, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=12"],
            ["メタリックトート（2way）", 3900, 2, 0, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=17"],
            ["マルチストラップ", 2400, 2, 0, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=18"],
            ["ハンディファン", 5100, 2, 0, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=19"],
            ["ペンライト", 5800, 2, 0, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=20"],
            ["チケットキーホルダー（東京会場Ver.）", 1000, 2, 1, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=21"],
            ["チケットキーホルダー（大阪会場Ver.）", 1000, 2, 2, false, "https://store.domotofc.jp/detail.php?order=new_desc&goods_id=22"],
            ["【東京ドームコラボ】Tシャツ BLACK", 6000, 2, 1, true, "https://mitsui-shopping-park.com/ec/p/6260600000036?mallColor=0101"],
            ["【東京ドームコラボ】Tシャツ WHITE", 6000, 2, 1, true, "https://mitsui-shopping-park.com/ec/p/6260600000037?mallColor=0201"]
        ];

        let qty = JSON.parse(localStorage.getItem("DOMOTO_calc_2607_qty"));
        if (!Array.isArray(qty) || qty.length !== items.length) {
            qty = Array(items.length).fill(0);
        }

        let v = JSON.parse(localStorage.getItem("DOMOTO_calc_2607_venues")) || {tky: true, osk: true};

        function toggleVenue(target) {
            const other = target === "tky" ? "osk" : "tky";
            if (v[target] && !v[other]) return;
            v[target] = !v[target];
            localStorage.setItem("DOMOTO_calc_2607_venues", JSON.stringify(v));
            updateUI();
        }

        function updateUI() {
            document.getElementById("btn-tky").className = `segment-btn ${v.tky ? 'active' : ''}`;
            document.getElementById("btn-osk").className = `segment-btn ${v.osk ? 'active' : ''}`;
            draw();
        }

        function draw() {
            const listEl = document.getElementById("list");
            listEl.innerHTML = "";
            let total = 0, target = 0;
            items.forEach((it, i) => {
                const en = (it[3] === 0) || (it[3] === 1 && v.tky) || (it[3] === 2 && v.osk);
                if (en) {
                    total += qty[i] * it[1];
                    if (!it[4]) target += qty[i] * it[1];
                }
                
                const linkHTML = it[5] 
                    ? `<a class="item-link" href="${it[5]}" target="_blank" rel="noopener noreferrer">${it[0]}</a>` 
                    : it[0];

                listEl.innerHTML += `
                <div class="card ${en ? '' : 'disabled'}">
                    <b>${linkHTML}${it[4] ? '<span class=badge>特典除外</span>' : ''}</b>
                    <div class="row">
                        <div class="price">¥${it[1].toLocaleString()}</div>
                        <div class="qty-area" style="display:flex;align-items:center;gap:10px">
                            <button class="qty-btn" ${qty[i]==0?'disabled':''} onclick="chg(${i},-1)">−</button>
                            <span class="qty-val">${qty[i]}</span>
                            <button class="qty-btn" ${qty[i]>=it[2]?'disabled':''} onclick="chg(${i},1)">＋</button>
                        </div>
                    </div>
                </div>`;
            });
            localStorage.setItem("DOMOTO_calc_2607_qty", JSON.stringify(qty));
            document.getElementById("bar-left-content").innerHTML = `特典セット:${Math.floor(target/15000)}<br>あと:${(15000 - target%15000).toLocaleString()}`;
            document.getElementById("total-val-content").innerText = "¥" + total.toLocaleString();
        }

        function chg(i, d) { qty[i] = Math.max(0, Math.min(items[i][2], qty[i] + d)); draw(); }
        function resetAll() { localStorage.removeItem("DOMOTO_calc_2607_qty"); qty = Array(items.length).fill(0); draw(); }
        
        updateUI();
    </script>
</body>
</html>
