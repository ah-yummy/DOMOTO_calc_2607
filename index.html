<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>グッズの計算機</title>
    <style>
        body { font-family: system-ui, sans-serif; background: linear-gradient(to bottom, #f8bbd0, #b3e5fc); background-attachment: fixed; margin: 0; padding: 0 0 100px; }
        h1 { margin: 0; padding: 0 16px; height: 70px; display: flex; flex-direction: column; justify-content: center; background: #0066ff; color: #fff; text-align: center; font-size: 20px; font-weight: 800; }
        .controls { padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .reset-btn { height: 40px; padding: 0 20px; border-radius: 20px; border: none; background: rgba(255,255,255,.92); box-shadow: 0 2px 6px rgba(0,0,0,.12); cursor: pointer; }
        .card { background: rgba(255, 255, 255, 0.7); margin: 10px; border-radius: 16px; padding: 14px; backdrop-filter: blur(5px); }
        .row { display: flex; justify-content: space-between; align-items: center; }
        .qty-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: rgba(255,255,255,.92); cursor: pointer; }
        
        #bar { position: fixed; left: 0; right: 0; bottom: 0; background: #d91e18; color: #fff; height: 70px; display: flex; align-items: center; padding: 0 15px; box-sizing: border-box; }
        .bar-left { width: 170px; flex-shrink: 0; font-size: 12px; font-weight: bold; }
        .bar-right { flex-grow: 1; display: flex; justify-content: flex-end; align-items: center; }
        
        .total-label { font-size: 14px; font-weight: bold; margin-right: 20px; padding-right: 40px; }
        .total-val { font-size: 26px; font-weight: 800; width: 140px; text-align: right; }
    </style>
</head>
<body>
    <h1>グッズの計算機</h1>
    <div class="controls">
        <label><input id="filter" type="checkbox"> 選択した商品だけ表示</label>
        <button class="reset-btn" onclick="resetAll()">リセット</button>
    </div>
    <div id="list"></div>
    <div id="bar">
        <div class="bar-left" id="barInfo"></div>
        <div class="bar-right">
            <div class="total-label">合計</div>
            <div class="total-val" id="totalVal">¥0</div>
        </div>
    </div>
    <script>
        const items = [
            ["フォトパンフ", 3500, 2, false], ["ポリうちわ", 1300, 2, false], ["ハンドタオル", 1900, 2, false],
            ["アクリルスタンド（全3種類）", 1400, 5, false], ["アクリルスタンド（コンプリートセット）", 4900, 2, false],
            ["ビッグシルエットTシャツ", 6000, 2, false], ["メタリックトート（2way）", 3900, 2, false],
            ["マルチストラップ", 2400, 2, false], ["ハンディファン", 5100, 2, false],
            ["ペンライト", 5800, 2, false], ["チケットキーホルダー（東京会場Ver.）", 1000, 2, false],
            ["【東京ドームコラボ】Tシャツ BLACK", 6000, 2, true], ["【東京ドームコラボ】Tシャツ WHITE", 6000, 2, true]
        ];
        let qty = JSON.parse(localStorage.getItem('goodsQty')) || Array(items.length).fill(0);
        function draw() {
            let l = list; l.innerHTML = "";
            let total = 0, target = 0;
            items.forEach((it, i) => {
                total += qty[i] * it[1];
                if (!it[3]) target += qty[i] * it[1];
                if (filter.checked && qty[i] == 0) return;
                let d = document.createElement("div");
                d.className = "card";
                d.innerHTML = `<b>${it[0]}</b><div class=row><div>¥${it[1].toLocaleString()}</div><div style="display:flex; align-items:center; gap:8px;"><button class="qty-btn" onclick='chg(${i},-1)'>−</button><div style="width:30px;text-align:center;font-weight:800;">${qty[i]}</div><button class="qty-btn" onclick='chg(${i},1)'>＋</button></div></div>`;
                l.appendChild(d);
            });
            let t = Math.floor(target / 15000), next = 15000 - target % 15000;
            barInfo.innerHTML = `<div>🎁 特典：${t}セット</div><div>✨️ 次の特典まであと：¥${next.toLocaleString()}</div>`;
            totalVal.innerText = "¥" + total.toLocaleString();
        }
        function chg(i, d) { qty[i] = Math.max(0, Math.min(items[i][2], qty[i] + d)); localStorage.setItem('goodsQty', JSON.stringify(qty)); draw(); }
        function resetAll() { qty.fill(0); localStorage.removeItem('goodsQty'); draw(); }
        filter.onchange = draw; draw();
    </script>
</body>
</html>
